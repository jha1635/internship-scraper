name: Daily Internship Scraper

on:
  schedule:
    - cron: '30 3 * * *' # Roz subah India ke time ke hisab se 9:00 AM par chalega
  workflow_dispatch: # Isse tum jab chahe manually bhi run kar sakte ho

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4 # Node warning theek karne ke liye v4 kiya

    - name: Set up Python
      uses: actions/setup-python@v5 # Python setup ko sahi kiya
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Scraper Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py
